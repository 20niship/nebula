name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK + build deps
        uses: ./.github/actions/setup-vulkan

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DVULKAN_SDK=/usr

      - name: Build (tests only)
        run: cmake --build build --target vulkan_tests -j$(nproc)

      - name: Run tests
        run: |
          # Use Mesa lavapipe (CPU software Vulkan) — no discrete GPU required
          ICD=$(find /usr/share/vulkan/icd.d/ -name "lvp_icd*.json" 2>/dev/null | head -1)
          echo "Using ICD: ${ICD:-NOT FOUND}"
          export VK_ICD_FILENAMES="$ICD"
          ctest --test-dir build --output-on-failure
